[pytest]
markers =
    fast: Быстрые тесты — один запрос, маленький ответ. Гоняем на каждый коммит.
    slow: Медленные — много запросов или большая параметризация. Раз в день или перед мержем.

# --reruns / --reruns-delay: повторяем упавший тест до 3 раз с паузой 2 сек.
# Спасает от случайных сетевых ошибок и 429 от rate limit CoinGecko.
addopts =
    --tb=short
    -v
    --reruns=3
    --reruns-delay=2

testpaths = tests
